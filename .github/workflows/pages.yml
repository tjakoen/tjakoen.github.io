name: Deploy to GitHub Pages

# The site is a static PROJECTION of the running server (ARCHITECTURE §18):
# bun install pulls the layer git-deps (docs ride inside the packages),
# bun run export crawls the booted app into dist/, bun run verify:export gates the result
# (every sitemap URL + every internal link must resolve to a real file — Phase 2), and Pages
# serves dist/. See ../SPLIT-PLAN.md § "The static front door".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read   # to install the @tjakoen/* layers from GitHub Packages

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      # The @tjakoen/* layers live in GitHub Packages (private); auth the scope with the
      # workflow token. The committed .npmrc already routes @tjakoen -> npm.pkg.github.com.
      - run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
      - run: bun install --frozen-lockfile
      - run: bun run export
        env:
          PUBLIC_ORIGIN: https://tjakoen.github.io
      - run: bun run verify:export
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
