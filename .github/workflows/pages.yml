name: Deploy to GitHub Pages

# The site is a static PROJECTION of the running server (ARCHITECTURE §18):
# bun install pulls the layer git-deps (docs ride inside the packages),
# bun run export crawls the booted app into dist/, and Pages serves dist/.
# See ../SPLIT-PLAN.md § "The static front door".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run export
        env:
          PUBLIC_ORIGIN: https://tjakoen.github.io
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
