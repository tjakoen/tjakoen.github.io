<!-- molecules/agenda-item — one row of the /calendar Agenda, data-bound via
     each="calendarEvents" (server.ts). A real note publish date or desk-feed post, never an
     invented event; see agenda-item.md for the full data-source + naming notes. -->
<li class="agenda__item" data-bind-id="domId" data-bind-data-date="date" data-bind-data-event-kind="kind">
  <time class="agenda__date" data-bind-datetime="date" data-field="dateLabel"></time>
  <div class="agenda__main">
    <a class="agenda__title" data-bind-href="link" data-field="title"></a>
    <details class="agenda__more">
      <summary><span class="agenda__icon" aria-hidden="true" data-field="icon"></span> More</summary>
      <p data-field="body"></p>
      <p class="agenda__tags" data-field="tagsLabel"></p>
    </details>
  </div>
</li>
