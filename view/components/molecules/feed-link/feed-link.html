<!-- molecules/feed-link — one related link under a feed card, nested each="links" inside feed-card
     (bound to an event's links: {href,label}). The whole row hides when an event has no links. -->
<li class="feed-card__link-item">
  <a class="feed-card__link" data-bind-href="href" data-field="label"></a>
</li>
