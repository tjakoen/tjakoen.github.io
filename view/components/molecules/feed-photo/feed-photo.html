<!-- molecules/feed-photo — one image in a feed card's photo strip, nested each="photos" inside
     feed-card (bound to an event's photos: {src,width,height,alt}). data-lightbox makes it a
     trigger for GRAIN's image viewer (scripts/lightbox.js): a click opens the full image in a
     modal, walking every photo in the strip's [data-lightbox-group] (feed-card.html) — including
     ones the five-tile cap hides. The href stays the full image, so with no JS (or a modified
     click) it's still a real navigation, the no-JS-safe fallback. The bound width/height reserve
     the aspect box so a slow photo can't shift the layout. The event PAGE renders the same
     .feed-photos markup from its frontmatter (content.ts renderPhotoGrid), so a card and its page
     look identical. See feed-photo.md. -->
<a class="feed-photo" data-lightbox data-bind-href="src">
  <img loading="lazy" decoding="async" data-bind-src="src" data-bind-width="width" data-bind-height="height" data-bind-alt="alt">
</a>
