<!DOCTYPE html>
<html lang="en" data-themes="sourdough baguette brioche">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar · TJ's Desk</title>
  <meta name="description" content="The desk's calendar: Month, Week, and Agenda views over the same real things, note publish dates and posts about what shipped. Part of the desktop metaphor, not a live scheduling tool.">
</head>
<body data-screen="calendar" class="app-window-backdrop">
  <div class="app-shell app-window" data-section="calendar" data-rail-collapsed="false" data-surface="screen">
    <portfolio-frame />
    <main class="app-shell__main">
      <div class="board">
        <section class="cal" data-cal-panel="month" hidden aria-label="Month">
          <div class="cal__head">
            <span class="cal__month" data-cal="title">Loading…</span>
            <a class="cal__to-feed" href="#feed">Jump to feed ↓</a>
          </div>
          <div class="cal__grid" data-cal="dow"></div>
          <div class="cal__grid" data-cal="grid">
            <noscript><p class="muted" style="padding: var(--space-5)">This month grid renders with a
              little JavaScript. With it off, the feed below is the whole page, every dated thing as a
              plain list.</p></noscript>
          </div>
          <p class="cal__legend">
            <span><span class="cal__swatch" style="background: var(--color-accent-soft)"></span>notes</span>
            <span><span class="cal__swatch" style="background: var(--paper-2); border: 1px solid var(--line-soft)"></span>shipped</span>
            <span><span class="cal__swatch cal__swatch--event"></span>events</span>
            <span><span class="cal__swatch" style="background: var(--color-accent)"></span>today</span>
          </p>
        </section>

        <section class="feed" id="feed" data-cal-panel="feed">
          <div class="section-head"><span>Feed</span></div>
          <ol class="feed__list"><feed-card each="calendarEvents"></feed-card></ol>
        </section>

        <div class="page-foot">
          Part of <a href="/">tjakoen.github.io</a>, built with itself.
          <p>🤖 Built with Claude. I don't prompt and pray, I prompt and prove.
            <a href="/notes/ten-times-zero">How I actually work with AI, receipts and all →</a></p>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Reads the real events straight off the server-rendered Feed (one source of truth, no fetch, no
    // second copy of the data) and plots the current Month from them, shown ABOVE the feed. The feed
    // itself is always on the page (it is the whole page with no JS — the month grid needs JS and
    // ships hidden). Clicking a day's chip scrolls the feed to that post and flashes it. Every event
    // is a real dated thing (note publish dates + shipped posts + the events collection) — nothing invented.
    (function () {
      var feedList = document.querySelector('.feed__list');
      var monthPanel = document.querySelector('[data-cal-panel="month"]');
      if (!feedList || !monthPanel) return;

      // ---- relative dates on the feed cards: server renders each date absolute (export-safe, in
      // title); rewrite [data-relativize] to "Today / Yesterday / N days ago", keeping the absolute. ----
      (function relativize() {
        var now = new Date();
        var today = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
        Array.prototype.forEach.call(feedList.querySelectorAll('[data-relativize]'), function (el) {
          var iso = el.getAttribute('data-date');
          if (!iso) return;
          var p = iso.split('-');
          if (p.length !== 3) return;
          var then = Date.UTC(+p[0], +p[1] - 1, +p[2]);
          var days = Math.round((today - then) / 86400000);
          if (days < 0) return;
          if (!el.getAttribute('title')) el.setAttribute('title', el.textContent);
          el.textContent = days === 0 ? 'Today' : days === 1 ? 'Yesterday' : days + ' days ago';
        });
      })();

      // ---- read events off the feed DOM ----
      var cards = Array.prototype.slice.call(feedList.querySelectorAll('.feed-card'));
      var events = cards.map(function (li) {
        var titleEl = li.querySelector('.feed-card__title');
        return {
          id: li.id,
          date: li.getAttribute('data-date') || '',
          kind: li.getAttribute('data-event-kind') || 'note',
          title: titleEl ? titleEl.textContent.trim() : '',
        };
      }).filter(function (e) { return e.date; });

      function isoKey(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }
      var byDate = {};
      events.forEach(function (e) {
        (byDate[e.date] = byDate[e.date] || []).push(e);
      });

      // ---- shared: a clickable chip for one event; the feed is always on the page, so the chip
      // just scrolls to its card and flashes it (no view switch anymore) ----
      function makeChip(e) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cal__event cal__event--' + (e.kind || 'note');
        btn.textContent = e.title;
        if (e.id) btn.setAttribute('data-target', e.id);   // the feed card this chip scrolls to
        btn.addEventListener('click', function () {
          var row = e.id && document.getElementById(e.id);
          if (!row) return;
          row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          row.classList.add('feed-card--highlight');
          setTimeout(function () { row.classList.remove('feed-card--highlight'); }, 1600);
        });
        return btn;
      }

      // ---- Month ----
      var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      var months = ['January', 'February', 'March', 'April', 'May', 'June', 'July',
        'August', 'September', 'October', 'November', 'December'];

      var dowEl = document.querySelector('[data-cal="dow"]');
      var gridEl = document.querySelector('[data-cal="grid"]');
      var titleEl = document.querySelector('[data-cal="title"]');

      var now = new Date();
      var year = now.getFullYear(), month = now.getMonth(), todayDate = now.getDate();
      titleEl.textContent = months[month] + ' ' + year;

      days.forEach(function (d) {
        var c = document.createElement('div');
        c.className = 'cal__dow';
        c.textContent = d;
        dowEl.appendChild(c);
      });

      var first = new Date(year, month, 1).getDay();
      var inMonth = new Date(year, month + 1, 0).getDate();
      var prevMonth = new Date(year, month, 0).getDate();

      for (var i = 0; i < 42; i++) {
        var cell = document.createElement('div');
        cell.className = 'cal__cell';
        var num = document.createElement('span');
        num.className = 'cal__num';

        var dateNum, out = false, cellDate;
        if (i < first) { dateNum = prevMonth - first + 1 + i; out = true; cellDate = new Date(year, month - 1, dateNum); }
        else if (i >= first + inMonth) { dateNum = i - first - inMonth + 1; out = true; cellDate = new Date(year, month + 1, dateNum); }
        else { dateNum = i - first + 1; cellDate = new Date(year, month, dateNum); }

        if (out) cell.classList.add('cal__cell--out');
        if (!out && dateNum === todayDate) cell.classList.add('cal__cell--today');
        num.textContent = dateNum;
        cell.appendChild(num);

        (byDate[isoKey(cellDate)] || []).forEach(function (e) { cell.appendChild(makeChip(e)); });
        gridEl.appendChild(cell);
      }

      monthPanel.hidden = false;   // reveal the month grid now that it's built (feed is always shown)
    })();
  </script>
</body>
</html>
